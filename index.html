<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Affirmation of The Day</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Lancelot&display=swap');
</style>
</head>
<body>
    
<div class="box-title">
<h1>Daily Affirmations</h1>
</div>

 <div class= "hero-image">

<form>
<div class="box-form">
    <h3>How Are You Feeling Today?</h3>
     <input type="radio" id="sad" name="feeling_option" value="sad">
     <label for="sad">sad</label><br>
     <input type="radio" id="happy" name="feeling_option" value="happy">
     <label for="happy">happy</label><br>
     <input type="radio" id="angry" name="feeling_option" value="angry">
     <label for="angry">angry</label><br>
      <input type="radio" id="anxious" name="feeling_option" value="anxious">
      <label for="anxious">anxious</label><br>
      <input type="radio" id="stressed" name="feeling_option" value="stressed">
      <label for="stressed">stressed</label><br>
      <input type="radio" id="tired" name="feeling_option" value="tired">
      <label for="tired">tired</label><br>
      <input type="radio" id="lonely" name="feeling_option" value="lonely">
      <label for="lonely">lonely</label><br>
  </div>
<br>
  <button type="submit">Send Form</button>
  </form>

<p id="result"></p>


    </div>



<script src="index.js"></script>
</body>

</html>
