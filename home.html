<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Affirmation of The Day</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Lancelot&display=swap');
</style>
</head>
<body>
    
<div class="box-title">
<h1>Daily Affirmations</h1>
</div>

<div class="container">
  <div class="box-1">
  <h3>Are you feeling sad today?</h3>
  <!-- <p>Don't worry, you are not alone. Here are some affirmations to help you feel better:</p> -->
  <form>
     <input type="radio" id="yes" name="sad_option" value="yes">
     <label for="yes">Yes</label><br>
     <input type="radio" id="no" name="sad_option" value="no">
     <label for="no">No</label><br>
  </form>
  </div>

  <div class="box-2">
  <h3>Are you feeling stressed today?</h3>
  <form>
     <input type="radio" id="yes" name="stressed_option" value="yes">
     <label for="yes">Yes</label><br>
     <input type="radio" id="no" name="stressed_option" value="no">
     <label for="no">No</label><br>
  </form>
  </div>

  <div class="box-3">
  <h3>Are you feeling anxious today?</h3>
  <form>
     <input type="radio" id="yes" name="anxious_option" value="yes">
     <label for="yes">Yes</label><br>
     <input type="radio" id="no" name="anxious_option" value="no">
     <label for="no">No</label><br>
  </form>
  </div>

</div>


    




</body>
</html>
